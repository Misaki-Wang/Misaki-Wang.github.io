  #   - Classical Artificial Neural Network : 5_Classical Artificial Neural Network.md
  #   - Support Vector Machine : 6_Support Vector Machine.md
  #   - Decision Trees,Random Forest and Ensemble Learning : 9_Decision Trees,Random Forest and Ensemble Learning.md
  #   - Hidden Markov Models and Introduction to Graphic Model : 12_Hidden Markov Models and Introduction to Graphic Model.md
  #   - Clustering-Unsupervised Pattern Recognition : 14_Clustering Unsupervised Pattern Recognition.md