# Project information
site_name: Pattern Recognition
site_url: https://misaki-wang.github.io/
site_author: Misaki

# Repository
repo_name: PRML
repo_url: https://github.com/Misaki-Wang/Misaki-Wang.github.io

# Copyright
copyright: Copyright &copy; 2023 Misaki

# Configuration
theme:
  name: material
  language: zh
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.indexes
    - navigation.instant
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - scheme: default
      primary: white
      # accent: indigo
      toggle:
        icon: material/theme-light-dark
        name: Switch to dark mode
    - scheme: slate
      primary: grey
      # accent: indigo
      toggle:
        icon: material/theme-light-dark
        name: Switch to light mode
  font:
    text: Noto Sans SC
    code: Fira Code
#   favicon: assets/images/favicon.png
#   logo: assets/images/logo.png
#   icon:
#     logo: logo
#     repo: fontawesome/brands/github
#     edit: material/file-edit-outline

# extra:
#   social:
#     - icon: fontawesome/brands/github
#       link: https://github.com/krahets
#     - icon: fontawesome/brands/twitter
#       link: https://twitter.com/krahets
#     - icon: fontawesome/solid/code
#       link: https://leetcode.cn/u/jyd/
#   generator: false
#   status:
#     new: 最近添加

# Plugins
plugins:
  - search

# Extensions
markdown_extensions:
  - abbr   # Abbreviations 
  - admonition # Admonition¶
  - attr_list # Attribute Lists
  - def_list # Definition Lists
  - footnotes # Footnotes
  - md_in_html # Markdown in HTML¶
  - toc:
      permalink: true
  # MathJax 
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/katex.js 
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.js  
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/contrib/auto-render.min.js

extra_css:
  # - stylesheets/rainbow.css
  - stylesheets/extra.css
  - https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.7/katex.min.css


# Page tree
nav:
  - Home: index.md
